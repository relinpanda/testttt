<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>啟動儀式</title>
<style>
  :root {
    --gold: #f6d27a;
    --gold-deep: #c79a3d;
    --bg0: #050608;
    --bg1: #0d1320;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg0);
    color: #fff;
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(120% 90% at 50% 12%, #16203a 0%, var(--bg1) 42%, var(--bg0) 100%);
  }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* 垂直置中直欄：圓圈在上、文字在下 */
  .column {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    pointer-events: none;
  }

  /* 中央集氣環 */
  .core {
    position: relative;
    width: min(62vw, 300px);
    height: min(62vw, 300px);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(246,210,122,.25);
    box-shadow: inset 0 0 40px rgba(246,210,122,.08);
  }
  .ring-fill {
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    background: conic-gradient(var(--gold) calc(var(--p,0) * 1%), rgba(255,255,255,.04) 0);
    -webkit-mask: radial-gradient(closest-side, transparent 72%, #000 73%);
            mask: radial-gradient(closest-side, transparent 72%, #000 73%);
    transition: filter .2s ease;
    filter: drop-shadow(0 0 calc(6px + var(--p,0)*0.18px) rgba(246,210,122,.7));
  }
  .glow {
    position: absolute;
    width: 38%;
    height: 38%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(246,210,122,.95), rgba(246,210,122,.15) 60%, transparent 70%);
    transform: scale(calc(.5 + var(--p,0)*0.006));
    opacity: calc(.35 + var(--p,0)*0.0055);
    transition: transform .15s ease, opacity .15s ease;
  }
  .label {
    text-align: center;
    line-height: 1.7;
  }
  .label .big { font-size: clamp(20px, 6vw, 30px); letter-spacing: .18em; font-weight: 600; }
  .label .small {
    margin-top: 10px;
    font-size: clamp(12px, 3.4vw, 15px);
    letter-spacing: .25em;
    color: rgba(246,210,122,.85);
  }
  /* 圓圈正中央的集氣百分比 */
  .pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    font-size: clamp(40px, 13vw, 72px);
    font-weight: 300;
    letter-spacing: .04em;
    color: var(--gold);
    text-shadow: 0 0 24px rgba(246,210,122,.6);
    opacity: 0;
    transition: opacity .25s ease;
  }

  /* 提示文字 */
  .hint {
    position: fixed;
    bottom: max(36px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(13px, 3.6vw, 16px);
    letter-spacing: .22em;
    color: rgba(255,255,255,.78);
    z-index: 5;
    animation: breathe 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes breathe { 0%,100%{opacity:.45} 50%{opacity:1} }

  /* 全螢幕閃光 */
  #flash {
    position: fixed; inset: 0; z-index: 9;
    background: #fff; opacity: 0; pointer-events: none;
  }

  /* 控制列（demo 用，正式版由控制台遠端觸發） */
  .panel {
    position: fixed; top: max(14px, env(safe-area-inset-top)); left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  .panel button {
    font: inherit; font-size: 13px; letter-spacing: .1em;
    color: var(--gold); background: rgba(255,255,255,.04);
    border: 1px solid rgba(246,210,122,.4); border-radius: 999px;
    padding: 7px 14px; cursor: pointer; backdrop-filter: blur(6px);
  }
  .panel button:active { background: rgba(246,210,122,.18); }

  .state-charging .ring { border-color: rgba(246,210,122,.55); }
  .fired .label, .fired .hint { opacity: 0; transition: opacity .3s; }
</style>
</head>
<body>
<div id="stage" class="state-idle">
  <canvas id="fx"></canvas>
  <div class="column">
    <div class="core">
      <div class="ring"></div>
      <div class="glow"></div>
      <div class="ring-fill"></div>
      <div class="pct" id="pct">0</div>
    </div>
    <div class="label" id="label">
      <div class="big">啟動儀式</div>
      <div class="small">長 按 畫 面 ・ 一 起 集 氣</div>
    </div>
  </div>
</div>

<div class="hint" id="hint">按住不放，能量會逐漸匯聚</div>
<div id="flash"></div>

<div class="panel">
  <button id="btnFire">模擬點火</button>
  <button id="btnReset">重置</button>
</div>

<script>
const stage   = document.getElementById('stage');
const fillEl  = document.querySelector('.ring-fill');
const glowEl  = document.querySelector('.glow');
const coreEl  = document.querySelector('.core');
const labelEl = document.getElementById('label');
const hintEl  = document.getElementById('hint');
const pctEl   = document.getElementById('pct');
const flashEl = document.getElementById('flash');
const cv  = document.getElementById('fx');
const ctx = cv.getContext('2d');

let DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  cv.width  = innerWidth  * DPR;
  cv.height = innerHeight * DPR;
}
resize();
addEventListener('resize', resize);

// ---- 集氣狀態 ----
let charge = 0;          // 0~100
let holding = false;
let fired = false;

function setCharge(v){
  charge = Math.max(0, Math.min(100, v));
  const p = charge;
  fillEl.style.setProperty('--p', p);
  glowEl.style.setProperty('--p', p);
  if (p > 2){
    pctEl.style.opacity = 1;
    pctEl.textContent = Math.round(p);
  } else {
    pctEl.style.opacity = 0;
  }
}

// 按住累積、放開緩降
function tickCharge(){
  if (!fired){
    if (holding) setCharge(charge + 1.1);
    else if (charge > 0) setCharge(charge - 0.7);
  }
  requestAnimationFrame(tickCharge);
}
tickCharge();

function vibrate(pattern){ if (navigator.vibrate) try{ navigator.vibrate(pattern); }catch(e){} }

function startHold(e){
  if (fired) return;
  e.preventDefault();
  if (!holding){ holding = true; stage.classList.add('state-charging'); vibrate(12); }
}
function endHold(){
  holding = false;
  stage.classList.remove('state-charging');
}
['touchstart','mousedown'].forEach(ev => stage.addEventListener(ev, startHold, {passive:false}));
['touchend','touchcancel','mouseup','mouseleave'].forEach(ev => stage.addEventListener(ev, endHold));

// ---- 光束特效 ----
let beam = null;       // {t0, dur}
let particles = [];

function fire(){
  if (fired) return;
  fired = true;
  holding = false;
  stage.classList.add('fired');
  hintEl.style.opacity = 0;
  vibrate([0, 40, 30, 120]);

  // 閃光
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '0.9';
  requestAnimationFrame(()=>{
    flashEl.style.transition = 'opacity .55s ease-out';
    flashEl.style.opacity = '0';
  });

  beam = { t0: performance.now(), dur: 2600 };
  spawnParticles();
}

function spawnParticles(){
  particles = [];
  const cx = cv.width/2, cy = cv.height/2;
  const n = 90;
  for (let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = (1.5 + Math.random()*5) * DPR;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2*DPR,
      life: 1, decay: 0.006 + Math.random()*0.012,
      size: (1 + Math.random()*2.4) * DPR
    });
  }
}

function reset(){
  fired = false; holding = false; beam = null; particles = [];
  stage.classList.remove('fired','state-charging');
  hintEl.style.opacity = '';
  setCharge(0);
}

// ---- 主繪製迴圈（光束 + 粒子 + 蓄能微光） ----
function draw(now){
  ctx.clearRect(0,0,cv.width,cv.height);
  const cx = cv.width/2, cy = cv.height/2;

  // 蓄能時中央微微發光擴散
  if (!fired && charge > 4){
    const r = (charge/100) * Math.min(cv.width,cv.height)*0.5;
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0, `rgba(246,210,122,${0.10 + charge/500})`);
    g.addColorStop(1, 'rgba(246,210,122,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,cv.width,cv.height);
  }

  // 光束
  if (beam){
    const e = (now - beam.t0) / beam.dur;     // 0~1
    if (e >= 1){ beam = null; }
    else {
      const rise = Math.min(1, e/0.25);                 // 上升
      const fade = e > 0.6 ? 1 - (e-0.6)/0.4 : 1;       // 收尾淡出
      const topY = cy - (cy + 60*DPR) * easeOut(rise);
      const baseW = (24 + 70*pulse(now)) * DPR;
      const w = baseW * fade;

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';

      // 主光柱
      const grad = ctx.createLinearGradient(cx - w, 0, cx + w, 0);
      grad.addColorStop(0,   'rgba(246,210,122,0)');
      grad.addColorStop(0.5, `rgba(255,247,220,${0.95*fade})`);
      grad.addColorStop(1,   'rgba(246,210,122,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(cx - w, topY, w*2, cy - topY + 30*DPR);

      // 核心亮線
      ctx.fillStyle = `rgba(255,255,255,${0.9*fade})`;
      ctx.fillRect(cx - 2*DPR, topY, 4*DPR, cy - topY + 30*DPR);

      // 基座光暈
      const bg = ctx.createRadialGradient(cx,cy,0,cx,cy,(120+60*pulse(now))*DPR);
      bg.addColorStop(0, `rgba(255,247,220,${0.8*fade})`);
      bg.addColorStop(1, 'rgba(246,210,122,0)');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.arc(cx,cy,(120+60*pulse(now))*DPR,0,7); ctx.fill();

      // 頂端星芒
      const tipR = (40 + 20*pulse(now)) * DPR * fade;
      const tg = ctx.createRadialGradient(cx,topY,0,cx,topY,tipR);
      tg.addColorStop(0, `rgba(255,255,255,${fade})`);
      tg.addColorStop(1, 'rgba(255,247,220,0)');
      ctx.fillStyle = tg;
      ctx.beginPath(); ctx.arc(cx,topY,tipR,0,7); ctx.fill();

      ctx.restore();
    }
  }

  // 粒子
  if (particles.length){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles){
      p.x += p.vx; p.y += p.vy; p.vy += 0.06*DPR; p.life -= p.decay;
      if (p.life <= 0) continue;
      ctx.fillStyle = `rgba(246,210,122,${p.life})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,7); ctx.fill();
    }
    particles = particles.filter(p => p.life > 0);
    ctx.restore();
  }

  requestAnimationFrame(draw);
}
function easeOut(t){ return 1 - Math.pow(1-t,3); }
function pulse(now){ return 0.5 + 0.5*Math.sin(now/120); }
requestAnimationFrame(draw);

// 防螢幕休眠（HTTPS 環境才有效，本機開檔可能無效，不影響 demo）
async function keepAwake(){
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){}
}
keepAwake();
document.addEventListener('visibilitychange', ()=>{ if (document.visibilityState==='visible') keepAwake(); });

// 控制鈕
document.getElementById('btnFire').addEventListener('click', e=>{ e.stopPropagation(); fire(); });
document.getElementById('btnReset').addEventListener('click', e=>{ e.stopPropagation(); reset(); });
// 控制鈕不要觸發集氣
document.querySelector('.panel').addEventListener('mousedown', e=>e.stopPropagation());
document.querySelector('.panel').addEventListener('touchstart', e=>e.stopPropagation(), {passive:false});

setCharge(0);
</script>
</body>
</html>
