<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽獎動畫 Demo - QRPASS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --gold-bright: #ffd76a;
    --gold-deep: #8a6f1f;
    --cream: #fff8e7;
    --bg-image: url('https://photo.16pic.com/00/93/41/16pic_9341433_b.png');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Noto Serif TC', serif;
    background: #0a0204;
    color: var(--cream);
  }

  /* ====== 控制面板 ====== */
  .control-panel {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 8px;
    padding: 8px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 999px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .control-panel button {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--cream);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .control-panel button:hover {
    background: rgba(212,175,55,0.1);
    border-color: rgba(212,175,55,0.4);
  }

  .control-panel button.active {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
    color: #1a0508;
    font-weight: 700;
    box-shadow: 0 0 20px rgba(212,175,55,0.4);
  }

  .replay-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    padding: 12px 32px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(212,175,55,0.4);
    color: var(--gold-bright);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.3s ease;
  }

  .replay-btn:hover {
    background: rgba(212,175,55,0.15);
    transform: translateX(-50%) translateY(-2px);
  }

  /* ====== 舞台 ====== */
  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #0a0204;
  }

  .scene {
    position: absolute;
    inset: 0;
    display: none;
    overflow: hidden;
  }

  .scene.active { display: block; }

  /* 共用：背景圖層 + 暗化罩 */
  .bg-image-layer {
    position: absolute;
    inset: 0;
    background-image: var(--bg-image);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
  }

  .bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.3) 70%,
      rgba(0,0,0,0.55) 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* ====== 人名顯示 ====== */
  .winner-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 50;
    pointer-events: none;
  }

  .prize-label {
    font-family: 'Cinzel', 'Noto Serif TC', serif;
    font-size: 22px;
    letter-spacing: 0.4em;
    color: var(--gold-bright);
    margin-bottom: 24px;
    opacity: 0;
    text-shadow: 0 0 20px rgba(212,175,55,0.8), 0 2px 4px rgba(0,0,0,0.6);
  }

  .winner-name {
    font-family: 'Noto Serif TC', serif;
    font-weight: 900;
    font-size: clamp(80px, 14vw, 180px);
    letter-spacing: 0.15em;
    color: var(--cream);
    text-shadow:
      0 0 40px rgba(255,215,106,0.9),
      0 0 80px rgba(212,175,55,0.6),
      0 4px 12px rgba(0,0,0,0.7);
    opacity: 0;
    line-height: 1.1;
  }

  .brand-tag {
    font-family: 'Cinzel', sans-serif;
    font-size: 16px;
    letter-spacing: 0.5em;
    color: rgba(255,248,231,0.85);
    margin-top: 24px;
    opacity: 0;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  }

  /* ====== 效果 1：聚光燈 ====== */
  .scene-spotlight .winner-display.show .prize-label {
    animation: fadeInUp 0.8s 1.2s ease-out forwards;
  }
  .scene-spotlight .winner-display.show .winner-name {
    animation: nameReveal 0.9s 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .scene-spotlight .winner-display.show .brand-tag {
    animation: fadeInUp 0.8s 2.1s ease-out forwards;
  }

  .spotlight {
    position: absolute;
    top: -10%;
    width: 220px;
    height: 130vh;
    background: linear-gradient(to bottom,
      rgba(255,235,180,0.7) 0%,
      rgba(255,215,106,0.4) 30%,
      rgba(255,215,106,0.15) 60%,
      transparent 100%);
    transform-origin: top center;
    filter: blur(10px);
    mix-blend-mode: screen;
    opacity: 0;
    z-index: 10;
  }

  .scene-spotlight.playing .spotlight-1 { animation: spotlightSweep1 1.4s ease-in-out forwards; }
  .scene-spotlight.playing .spotlight-2 { animation: spotlightSweep2 1.4s ease-in-out forwards; }
  .scene-spotlight.playing .spotlight-3 { animation: spotlightSweep3 1.4s 0.2s ease-in-out forwards; }

  @keyframes spotlightSweep1 {
    0%   { opacity: 0; left: -10%; transform: rotate(35deg); }
    20%  { opacity: 1; }
    70%  { opacity: 1; left: 50%; transform: rotate(0deg) translateX(-50%); }
    100% { opacity: 0.85; left: 50%; transform: rotate(0deg) translateX(-50%); }
  }
  @keyframes spotlightSweep2 {
    0%   { opacity: 0; left: 110%; transform: rotate(-35deg); }
    20%  { opacity: 1; }
    70%  { opacity: 1; left: 50%; transform: rotate(0deg) translateX(-50%); }
    100% { opacity: 0.85; left: 50%; transform: rotate(0deg) translateX(-50%); }
  }
  @keyframes spotlightSweep3 {
    0%   { opacity: 0; left: 50%; transform: rotate(0deg) translateX(-50%) scaleX(0.3); }
    50%  { opacity: 1; transform: rotate(0deg) translateX(-50%) scaleX(1.2); }
    100% { opacity: 1; left: 50%; transform: rotate(0deg) translateX(-50%) scaleX(1); }
  }

  .center-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 700px;
    height: 700px;
    transform: translate(-50%, -50%) scale(0);
    background: radial-gradient(circle,
      rgba(255,215,106,0.45) 0%,
      rgba(255,215,106,0.15) 40%,
      transparent 70%);
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: 11;
  }

  .scene-spotlight.playing .center-glow {
    animation: glowPulse 1.5s 1s ease-out forwards;
  }

  @keyframes glowPulse {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    50%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
  }

  .stage-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--gold-bright);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gold-bright);
    pointer-events: none;
    opacity: 0;
    z-index: 12;
  }

  .scene-spotlight.playing .stage-particle {
    animation: floatUp 4s ease-out infinite;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.2); }
  }

  /* ====== 效果 2：金箔飄落 ====== */
  .foil {
    position: absolute;
    top: -50px;
    width: 18px;
    height: 18px;
    pointer-events: none;
    will-change: transform;
    z-index: 20;
  }

  .foil-shape {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,
      var(--gold-bright) 0%,
      var(--gold) 30%,
      var(--gold-deep) 60%,
      var(--gold) 100%);
    box-shadow: 0 0 6px rgba(212,175,55,0.7);
  }

  .foil-rect .foil-shape { width: 6px; height: 22px; }
  .foil-circle .foil-shape { border-radius: 50%; width: 14px; height: 14px; }

  .scene-foil.playing .foil {
    animation:
      foilFall var(--fall-duration, 5s) var(--fall-delay, 0s) linear infinite,
      foilSpin var(--spin-duration, 2s) var(--fall-delay, 0s) linear infinite;
  }

  @keyframes foilFall {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(110vh) translateX(var(--drift, 50px)); opacity: 0; }
  }

  @keyframes foilSpin {
    0%   { filter: brightness(1); }
    25%  { filter: brightness(1.5); }
    50%  { filter: brightness(0.6); }
    75%  { filter: brightness(1.5); }
    100% { filter: brightness(1); }
  }

  .scene-foil.playing .foil-shape {
    animation: foilFlip var(--flip-duration, 1.5s) linear infinite;
  }

  @keyframes foilFlip {
    0%   { transform: rotateY(0) rotateX(0); }
    50%  { transform: rotateY(180deg) rotateX(90deg); }
    100% { transform: rotateY(360deg) rotateX(180deg); }
  }

  .scene-foil .winner-display.show .prize-label { animation: fadeInUp 0.8s 1.5s ease-out forwards; }
  .scene-foil .winner-display.show .winner-name { animation: nameReveal 0.9s 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .scene-foil .winner-display.show .brand-tag { animation: fadeInUp 0.8s 2.4s ease-out forwards; }

  /* ====== 共用文字動畫 ====== */
  @keyframes fadeInUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @keyframes nameReveal {
    0%   { opacity: 0; transform: scale(0.7); filter: blur(20px); letter-spacing: 0.5em; }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); letter-spacing: 0.15em; }
  }

  /* 標籤說明 */
  .info-tag {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 100;
    padding: 10px 16px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(212,175,55,0.2);
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: rgba(255,248,231,0.85);
    max-width: 200px;
    line-height: 1.6;
  }

  .info-tag strong {
    color: var(--gold-bright);
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .control-panel { padding: 6px; gap: 4px; top: 12px; }
    .control-panel button { padding: 8px 12px; font-size: 12px; }
    .info-tag { display: none; }
    .replay-btn { padding: 10px 20px; font-size: 12px; bottom: 20px; }
  }
</style>
</head>
<body>

<div class="control-panel">
  <button data-scene="spotlight" class="active">聚光燈掃射</button>
  <button data-scene="foil">金箔飄落</button>
</div>

<div class="info-tag" id="infoTag">
  <strong>聚光燈掃射</strong>
  多道光束從左右上方掃過，最後鎖定中央人名。適合主獎、頭獎的儀式感。
</div>

<div class="stage">

  <div class="scene scene-spotlight active" id="scene-spotlight">
    <div class="bg-image-layer"></div>
    <div class="bg-vignette"></div>
    <div class="spotlight spotlight-1"></div>
    <div class="spotlight spotlight-2"></div>
    <div class="spotlight spotlight-3"></div>
    <div class="center-glow"></div>
    <div class="particles-container" id="spotlight-particles"></div>
    <div class="winner-display">
      <div class="prize-label">第 一 獎 ・ 主 獎</div>
      <div class="winner-name">王小明</div>
      <div class="brand-tag">QRPASS</div>
    </div>
  </div>

  <div class="scene scene-foil" id="scene-foil">
    <div class="bg-image-layer"></div>
    <div class="bg-vignette"></div>
    <div class="foils-container" id="foils-container"></div>
    <div class="winner-display">
      <div class="prize-label">第 一 獎 ・ 主 獎</div>
      <div class="winner-name">王小明</div>
      <div class="brand-tag">QRPASS</div>
    </div>
  </div>

</div>

<button class="replay-btn" id="replayBtn">↻ 重新播放</button>

<script>
  const sceneInfo = {
    spotlight: {
      title: '聚光燈掃射',
      desc: '多道光束從左右上方掃過，最後鎖定中央人名。適合主獎、頭獎的儀式感。'
    },
    foil: {
      title: '金箔飄落',
      desc: '金色薄片從上方旋轉飄落,光影翻轉帶出質感。比一般彩帶更精緻優雅。'
    }
  };

  const buttons = document.querySelectorAll('.control-panel button');
  const scenes = document.querySelectorAll('.scene');
  const winnerDisplays = document.querySelectorAll('.winner-display');
  const infoTag = document.getElementById('infoTag');
  const replayBtn = document.getElementById('replayBtn');
  let currentScene = 'spotlight';

  function initSpotlightParticles() {
    const container = document.getElementById('spotlight-particles');
    container.innerHTML = '';
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'stage-particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = Math.random() * 30 + '%';
      p.style.animationDelay = Math.random() * 4 + 's';
      p.style.animationDuration = (3 + Math.random() * 2) + 's';
      container.appendChild(p);
    }
  }

  function initFoils() {
    const container = document.getElementById('foils-container');
    container.innerHTML = '';
    const shapes = ['foil-square', 'foil-rect', 'foil-circle'];
    for (let i = 0; i < 60; i++) {
      const f = document.createElement('div');
      f.className = 'foil ' + shapes[Math.floor(Math.random() * shapes.length)];
      f.style.left = Math.random() * 100 + '%';
      f.style.setProperty('--fall-duration', (4 + Math.random() * 4) + 's');
      f.style.setProperty('--fall-delay', (Math.random() * 5) + 's');
      f.style.setProperty('--spin-duration', (1 + Math.random() * 2) + 's');
      f.style.setProperty('--flip-duration', (1 + Math.random() * 1.5) + 's');
      f.style.setProperty('--drift', (Math.random() * 200 - 100) + 'px');
      const inner = document.createElement('div');
      inner.className = 'foil-shape';
      f.appendChild(inner);
      container.appendChild(f);
    }
  }

  function switchScene(name) {
    currentScene = name;
    scenes.forEach(s => s.classList.remove('active', 'playing'));
    buttons.forEach(b => b.classList.remove('active'));
    winnerDisplays.forEach(w => w.classList.remove('show'));

    document.getElementById('scene-' + name).classList.add('active');
    document.querySelector(`button[data-scene="${name}"]`).classList.add('active');

    infoTag.innerHTML = `<strong>${sceneInfo[name].title}</strong>${sceneInfo[name].desc}`;

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.getElementById('scene-' + name).classList.add('playing');
        const display = document.querySelector('#scene-' + name + ' .winner-display');
        if (display) display.classList.add('show');
      });
    });

    if (name === 'spotlight') initSpotlightParticles();
    if (name === 'foil') initFoils();
  }

  buttons.forEach(btn => btn.addEventListener('click', () => switchScene(btn.dataset.scene)));
  replayBtn.addEventListener('click', () => switchScene(currentScene));

  initSpotlightParticles();
  switchScene('spotlight');
</script>

</body>
</html>
