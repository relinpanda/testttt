<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言抽獎</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --line: #e3e6ea;
    --text: #1f2430;
    --muted: #7b8190;
    --accent: #2f6df0;
    --accent-dark: #1f4fc4;
    --gold: #e0a417;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 24px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 18px;
  }

  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .hint { font-size: 13px; color: var(--muted); font-weight: 400; }

  input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 140px; }

  .drop {
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 26px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: .15s;
  }
  .drop:hover, .drop.over { border-color: var(--accent); background: #f0f5ff; color: var(--accent); }
  .drop strong { color: var(--text); }

  .checkrow { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 14px; }
  .checkrow input { width: auto; }

  .status { font-size: 14px; margin-top: 12px; }
  .status .ok { color: #1a8a4b; font-weight: 600; }

  button.draw {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: .15s;
  }
  button.draw:hover:not(:disabled) { background: var(--accent-dark); }
  button.draw:disabled { background: #c2c8d2; cursor: not-allowed; }

  .stage { text-align: center; min-height: 60px; }
  .reel {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 24px 0 8px;
    min-height: 64px;
    color: var(--text);
    word-break: break-all;
  }
  .prizeLabel { color: var(--gold); font-weight: 700; font-size: 16px; }

  .winners { margin-top: 4px; }
  .winner-group { margin-bottom: 22px; }
  .winner-group h3 { margin: 0 0 10px; font-size: 16px; border-left: 4px solid var(--gold); padding-left: 10px; }
  .wlist { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .witem {
    background: #fffaf0;
    border: 1px solid #f0dca8;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 16px;
    font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    animation: pop .35s ease;
  }
  .witem .num { color: var(--gold); font-weight: 800; }
  @keyframes pop { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }

  .actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  button.sec {
    padding: 9px 16px; font-size: 14px; font-weight: 600;
    background: #fff; color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; cursor: pointer;
  }
  button.sec:hover { border-color: var(--accent); color: var(--accent); }
  .err { color: #c0392b; font-size: 14px; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>留言抽獎</h1>
  <p class="sub">上傳留言 CSV，填好獎項與人數，就能抽獎。全程在你的瀏覽器本機執行，不會上傳任何資料。</p>

  <!-- 1. 上傳 -->
  <div class="card">
    <label>1. 上傳留言名單（CSV）</label>
    <div class="drop" id="drop">
      <strong>點此選擇檔案</strong>，或把 CSV 拖進來<br>
      <span class="hint">支援先前抓下來的 ig_comments.csv</span>
    </div>
    <input type="file" id="file" accept=".csv,text/csv" hidden>
    <div class="status" id="status"></div>
    <div id="colMapWrap" style="display:none; margin-top:14px;">
      <label>帳號欄位 <span class="hint">（自動偵測，如不對請手動選）</span></label>
      <select id="colSelect"></select>
    </div>
  </div>

  <!-- 2. 設定 -->
  <div class="card">
    <label>2. 抽獎設定</label>
    <div class="row">
      <div>
        <label>獎項名稱</label>
        <input type="text" id="prize" placeholder="例如：頭獎 7-11 禮券">
      </div>
      <div>
        <label>抽出幾位</label>
        <input type="number" id="count" value="1" min="1">
      </div>
    </div>
    <div class="checkrow">
      <input type="checkbox" id="dedup">
      <label for="dedup" style="margin:0; font-weight:400;">同一帳號只算一票（打勾＝機率均等；不打勾＝留越多則機率越高）</label>
    </div>
    <div class="checkrow">
      <input type="checkbox" id="exclude" checked>
      <label for="exclude" style="margin:0; font-weight:400;">已中獎的帳號不再參與後續抽獎</label>
    </div>
    <p class="hint" style="margin:10px 0 0;">同一帳號在每一次抽獎中最多只會中一次（即使留了很多則）。</p>
  </div>

  <!-- 3. 抽獎 -->
  <div class="card">
    <button class="draw" id="drawBtn" disabled>開始抽獎</button>
    <div class="stage">
      <div class="prizeLabel" id="stagePrize"></div>
      <div class="reel" id="reel"></div>
    </div>
    <div class="err" id="err"></div>
  </div>

  <!-- 結果 -->
  <div class="winners" id="winners"></div>
  <div class="actions" id="resultActions" style="display:none;">
    <button class="sec" id="copyBtn">複製名單</button>
    <button class="sec" id="exportBtn">匯出 CSV</button>
    <button class="sec" id="resetBtn">清空結果</button>
  </div>
</div>

<script>
(function () {
  // ---------- CSV 解析（處理 BOM、引號、逗號、換行）----------
  function parseCSV(text) {
    text = text.replace(/^\uFEFF/, '');
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else if (c === '\r') { /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => c.trim() !== ''));
  }

  // ---------- 狀態 ----------
  let header = [], dataRows = [], accountCol = -1;
  let allWinners = []; // [{prize, names:[]}]

  const $ = id => document.getElementById(id);
  const drop = $('drop'), fileInput = $('file');

  // ---------- 上傳 ----------
  drop.addEventListener('click', () => fileInput.click());
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('over');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const rows = parseCSV(reader.result);
        if (rows.length < 2) { showStatus('檔案沒有可用的資料列。', true); return; }
        header = rows[0];
        dataRows = rows.slice(1);
        buildColSelect();
        autoPickAccountCol();
        refreshStatus();
        $('drawBtn').disabled = false;
      } catch (err) {
        showStatus('讀取失敗：' + err.message, true);
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  function buildColSelect() {
    const sel = $('colSelect');
    sel.innerHTML = '';
    header.forEach((h, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = (h || ('欄位 ' + (i + 1)));
      sel.appendChild(o);
    });
    $('colMapWrap').style.display = 'block';
    sel.onchange = () => { accountCol = parseInt(sel.value); refreshStatus(); };
  }

  function autoPickAccountCol() {
    accountCol = header.findIndex(h => /帳號|帳戶|account|username|user|名稱|姓名|name/i.test(h || ''));
    if (accountCol < 0) accountCol = 0;
    $('colSelect').value = accountCol;
  }

  function getNames() {
    let names = dataRows.map(r => (r[accountCol] || '').trim()).filter(Boolean);
    if ($('dedup').checked) {
      const seen = new Set(), out = [];
      names.forEach(n => { if (!seen.has(n)) { seen.add(n); out.push(n); } });
      names = out;
    }
    // 排除已中獎
    if ($('exclude').checked && allWinners.length) {
      const won = new Set(allWinners.flatMap(w => w.names));
      names = names.filter(n => !won.has(n));
    }
    return names;
  }

  function refreshStatus() {
    const total = dataRows.length;
    const uniq = new Set(dataRows.map(r => (r[accountCol] || '').trim()).filter(Boolean)).size;
    showStatus(`已載入 <span class="ok">${total}</span> 則留言，共 <span class="ok">${uniq}</span> 個不重複帳號。`);
  }
  function showStatus(html, isErr) {
    $('status').innerHTML = (isErr ? '<span style="color:#c0392b">' + html + '</span>' : html);
  }

  // ---------- 安全隨機抽樣 ----------
  function secureRand(n) {
    const a = new Uint32Array(1);
    crypto.getRandomValues(a);
    return a[0] % n;
  }
  // 抽出 k 位「不重複帳號」的中獎者；中獎後該帳號所有籤都移除，
  // 所以留越多則只會提高被選中的機率，不會中第二次。
  function sample(tickets, k) {
    const pool = tickets.slice();
    const out = [];
    while (out.length < k && pool.length) {
      const idx = secureRand(pool.length);
      const winner = pool[idx];
      out.push(winner);
      for (let j = pool.length - 1; j >= 0; j--) {
        if (pool[j] === winner) pool.splice(j, 1);
      }
    }
    return out;
  }

  // ---------- 抽獎 ----------
  $('drawBtn').addEventListener('click', draw);

  function draw() {
    $('err').textContent = '';
    const pool = getNames();
    const prize = $('prize').value.trim() || '獎項';
    const count = Math.max(1, parseInt($('count').value) || 1);

    if (!pool.length) { $('err').textContent = '沒有可抽的名單了。'; return; }
    const uniqAccts = new Set(pool).size;
    if (count > uniqAccts) { $('err').textContent = `可抽的帳號只有 ${uniqAccts} 位，無法抽出 ${count} 位。`; return; }

    const winners = sample(pool, count);
    $('drawBtn').disabled = true;
    $('stagePrize').textContent = '正在抽 — ' + prize;

    // 跑馬燈動畫
    let ticks = 0;
    const maxTicks = 28;
    const reel = $('reel');
    const spin = setInterval(() => {
      reel.textContent = pool[secureRand(pool.length)];
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(spin);
        reel.textContent = '🎉';
        allWinners.push({ prize, names: winners });
        renderWinners();
        $('stagePrize').textContent = '';
        $('drawBtn').disabled = false;
      }
    }, 70);
  }

  function renderWinners() {
    const box = $('winners');
    box.innerHTML = '';
    allWinners.forEach(group => {
      const g = document.createElement('div');
      g.className = 'winner-group';
      const items = group.names.map((n, i) =>
        `<div class="witem"><span class="num">${i + 1}</span> ${escapeHtml(n)}</div>`).join('');
      g.innerHTML = `<h3>🏆 ${escapeHtml(group.prize)}（${group.names.length} 位）</h3><div class="wlist">${items}</div>`;
      box.appendChild(g);
    });
    $('resultActions').style.display = allWinners.length ? 'flex' : 'none';
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  // ---------- 結果操作 ----------
  $('copyBtn').addEventListener('click', () => {
    const txt = allWinners.map(g =>
      `【${g.prize}】\n` + g.names.map((n, i) => `${i + 1}. ${n}`).join('\n')).join('\n\n');
    navigator.clipboard.writeText(txt).then(() => alert('已複製中獎名單！'));
  });

  $('exportBtn').addEventListener('click', () => {
    let lines = ['獎項,順位,帳號'];
    allWinners.forEach(g => g.names.forEach((n, i) => {
      lines.push([g.prize, i + 1, n].map(v => /[",\n]/.test(v) ? '"' + String(v).replace(/"/g, '""') + '"' : v).join(','));
    }));
    const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '中獎名單.csv';
    a.click();
  });

  $('resetBtn').addEventListener('click', () => {
    allWinners = [];
    renderWinners();
    $('reel').textContent = '';
  });
})();
</script>
</body>
</html>
